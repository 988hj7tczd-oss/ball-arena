<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>弹球大乱斗 Ball Arena</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
    background: #1a1a2e;
    width: 100%; height: 100%;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;
}
#game-wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    width: 100vw;
    height: 100vh;
    position: relative;
}
canvas { display: block; border: 1px solid #333; }
</style>
</head>
<body>
<div id="game-wrapper"><canvas id="game"></canvas></div>
<script src="src/game-core.js"></script>
</body>
</html>
